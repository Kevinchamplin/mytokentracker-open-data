name: Update open data

# Pulls the latest datasets from the public MyTokenTracker Data API once a day and
# commits any changes. Self-contained: uses the built-in GITHUB_TOKEN, no secrets.
# Safe: no untrusted github.event.* input is interpolated into run steps.
on:
  schedule:
    - cron: "17 7 * * *" # 07:17 UTC, after the upstream morning syncs land
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest datasets
        run: |
          base="https://mytokentracker.io/api/v1/data"
          mkdir -p data
          curl -fsSL "$base/cost-index"            -o data/cost-index.json
          curl -fsSL "$base/cost-index?format=csv" -o data/cost-index.csv
          curl -fsSL "$base/community"             -o data/community.json
          curl -fsSL "$base/community?format=csv"  -o data/community.csv
          curl -fsSL "$base/models"                -o data/models.json
          curl -fsSL "$base/models?format=csv"     -o data/models.csv
          curl -fsSL "$base/schema"                -o data/schema.json

      - name: Commit if changed
        run: |
          git config user.name "mtt-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push
          fi
